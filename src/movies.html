<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies — Bloggy</title>
  <meta name="description" content="A curated collection of films worth watching. Posters, ratings, and thoughts." />
  <meta name="author" content="Bloggy" />

  <!-- Open Graph -->
  <meta property="og:title" content="Movies — Bloggy" />
  <meta property="og:description" content="A curated collection of films worth watching." />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.85em' x='0.1em' font-family='serif' font-style='italic' font-size='90'>b</text></svg>" />

  <!-- Theme: prevent flash -->
  <script>
    (function() {
      const saved = localStorage.getItem('bloggy-theme');
      document.documentElement.setAttribute('data-theme', saved || 'light');
    })();
  </script>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo" id="home-link">
        bloggy<span class="logo-dot">.</span>
      </a>
      <nav class="header-nav" id="main-nav">
        <a href="index.html" id="nav-blog">Blog</a>
        <a href="movies.html" id="nav-movies" class="nav-active">Movies</a>
        <a href="https://github.com" target="_blank" rel="noopener" id="nav-github">GitHub</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
      </nav>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main>
    <!-- Hero -->
    <section class="hero" id="movies-hero">
      <div class="hero-content">
        <h1>Movies</h1>
        <p class="hero-description">Films that stayed with me.</p>
      </div>
    </section>

    <!-- Movies Grid -->
    <section class="movies-section site-container" id="movies-section">
      <div class="movies-section-label">Collection</div>
      <div class="movies-grid" id="movies-grid">
        <!-- Skeleton loading state (replaced by JS) -->
        <div class="loading-skeleton movie-skeleton"></div>
        <div class="loading-skeleton movie-skeleton"></div>
        <div class="loading-skeleton movie-skeleton"></div>
        <div class="loading-skeleton movie-skeleton"></div>
        <div class="loading-skeleton movie-skeleton"></div>
        <div class="loading-skeleton movie-skeleton"></div>
      </div>
    </section>
  </main>

  <!-- ===== MOVIE MODAL ===== -->
  <div class="movie-modal-overlay" id="movie-modal-overlay">
    <div class="movie-modal" id="movie-modal">
      <button class="movie-modal-close" id="movie-modal-close" aria-label="Close details">&times;</button>
      <div class="movie-modal-content" id="movie-modal-content">
        <!-- Populated by movies.js -->
      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer" id="site-footer">
    <div class="footer-inner">
      <span class="footer-text">© 2026 bloggy. Built with intention.</span>
      <div class="footer-links">
        <a href="https://github.com" target="_blank" rel="noopener" id="footer-github">GitHub</a>
        <a href="#" id="footer-rss">RSS</a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/theme.js"></script>
  <script src="js/movies.js"></script>

</body>
</html>
