<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Bloggy</title>
  <meta name="description" content="A blog post on Bloggy." />
  <meta name="author" content="Bloggy" />

  <!-- Open Graph -->
  <meta property="og:type" content="article" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='white' /><text y='70' x='50' text-anchor='middle' font-family='serif' font-style='italic' font-size='70' fill='black'>b</text></svg>" />

  <!-- Theme: prevent flash -->
  <script>
    (function() {
      const saved = localStorage.getItem('bloggy-theme');
      document.documentElement.setAttribute('data-theme', saved || 'light');
    })();
  </script>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo" id="home-link">
        bloggy<span class="logo-dot">.</span>
      </a>
      <nav class="header-nav" id="main-nav">
        <a href="index.html" id="nav-blog">Blog</a>
        <a href="movies.html" id="nav-movies">Movies</a>
        <a href="https://github.com" target="_blank" rel="noopener" id="nav-github">GitHub</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
      </nav>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main>
    <!-- Post Header -->
    <article class="content-container">
      <div class="post-header" id="post-header">
        <a href="index.html" class="post-back" id="back-link">← Back to all posts</a>
        <div id="post-header-content">
          <!-- Populated by post.js -->
          <div class="loading-skeleton" style="height: 24px; width: 200px; margin-bottom: 16px;"></div>
          <div class="loading-skeleton" style="height: 48px; width: 80%; margin-bottom: 12px;"></div>
          <div class="loading-skeleton" style="height: 20px; width: 60%;"></div>
        </div>
      </div>

      <hr class="post-divider" />

      <!-- Post Body -->
      <div class="prose" id="post-content">
        <!-- Populated by post.js -->
        <div class="loading-skeleton" style="height: 18px; width: 100%; margin-bottom: 12px;"></div>
        <div class="loading-skeleton" style="height: 18px; width: 95%; margin-bottom: 12px;"></div>
        <div class="loading-skeleton" style="height: 18px; width: 85%; margin-bottom: 24px;"></div>
        <div class="loading-skeleton" style="height: 18px; width: 100%; margin-bottom: 12px;"></div>
        <div class="loading-skeleton" style="height: 18px; width: 90%; margin-bottom: 12px;"></div>
      </div>
    </article>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer" id="site-footer">
    <div class="footer-inner">
      <span class="footer-text">© 2026 bloggy.</span>
      <div class="footer-links">
        <a href="https://github.com" target="_blank" rel="noopener" id="footer-github">GitHub</a>
        <a href="#" id="footer-rss">RSS</a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/theme.js"></script>
  <script src="js/post.js"></script>

</body>
</html>
